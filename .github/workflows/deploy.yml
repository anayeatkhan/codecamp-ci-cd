name: Deploy Frontend (Next.js) to GCP VM

on:
  push:
    branches:
      - main
      - staging

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  REPOSITORY: ${{ vars.CODECAMP_DEV }}
  IMAGE_NAME: frontend
  CODE_ENV: ${{ vars.CODECAMP }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------
      # Checkout code
      # ----------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------
      # Generate image tag
      # ----------------------
      - name: Generate Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      # ----------------------
      # Authenticate GCP
      # ----------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_V2 }}

      - name: Setup GCloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ----------------------
      # Docker auth
      # ----------------------
      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # ----------------------
      # Build Docker Image (IMPORTANT: Next.js build happens inside Dockerfile)
      # ----------------------
      - name: Build Docker Image
        run: |
          docker build \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${IMAGE_TAG} .

      # ----------------------
      # Push Image
      # ----------------------
      - name: Push Docker Image
        run: |
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${IMAGE_TAG}

      # ----------------------
      # Deploy to VM
      # ----------------------
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE_TAG,PROJECT_ID,REGION,REPOSITORY,IMAGE_NAME
          script: |
            set -e

            IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${IMAGE_TAG}"

            echo "Deploying frontend: $IMAGE"

            gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

            docker network create backend-net || true

            docker stop frontend || true
            docker rm frontend || true

            docker pull $IMAGE

            docker run -d \
              --name frontend \
              -p 3000:3000 \
              --network backend-net \
              --restart always \
              $IMAGE

            echo "Frontend deployed successfully"
